name: Publish

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - run: go test ./...

      - run: go build -ldflags "-s -w" -o workit.exe ./cmd/workit

      - uses: softprops/action-gh-release@v2
        with:
          files: workit.exe
